description: |-
  Town01 co-simulation scenario with one RSU per intersection and 10 CAVs
  distributed across the map.

world:
  town: Town01

vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 4
        positions:
          - [2.5, 0, 1.0, 0]
          - [0.0, 0.3, 1.8, 100]
          - [0.0, -0.3, 1.8, -100]
          - [-2.0, 0.0, 1.5, 180]
      lidar:
        visualize: false
        channels: 32
        range: 120
        points_per_second: 1000000
        rotation_frequency: 20
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false
      debug_helper:
        show_animation: false
  map_manager:
    visualize: false
  behavior:
    ignore_traffic_light: false
    collision_time_ahead: 2.0
    local_planner:
      debug_trajectory: false
      debug: false

rsu_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 4
        positions:
          - [2.5, 0, 1.0, 0]
          - [0.0, 0.3, 1.8, 100]
          - [0.0, -0.3, 1.8, -100]
          - [-2.0, 0.0, 1.5, 180]
      lidar:
        visualize: false
        channels: 128
        range: 120
        points_per_second: 5000000
        rotation_frequency: 20
        upper_fov: 20
        lower_fov: -90
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false
      dt: ${world.fixed_delta_seconds}
      gnss:
        noise_alt_stddev: 0.05
        noise_lat_stddev: 3e-6
        noise_lon_stddev: 3e-6

carla_traffic_manager:
  vehicle_list: []
  range: []

