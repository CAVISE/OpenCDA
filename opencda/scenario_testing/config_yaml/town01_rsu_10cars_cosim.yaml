description: |-
  Town01 co-simulation scenario for AIM testing with two RSUs and four CAVs.
  Each selected intersection has one AIM RSU and two CAVs.

world:
  town: Town01

vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 4
        positions:
          - [2.5, 0, 1.0, 0]
          - [0.0, 0.3, 1.8, 100]
          - [0.0, -0.3, 1.8, -100]
          - [-2.0, 0.0, 1.5, 180]
      lidar:
        visualize: false
        channels: 32
        range: 120
        points_per_second: 1000000
        rotation_frequency: 20
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false
      debug_helper:
        show_animation: false
  map_manager:
    visualize: false
  behavior:
    ignore_traffic_light: false
    collision_time_ahead: 2.0
    local_planner:
      debug_trajectory: false
      debug: false

rsu_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 4
        positions:
          - [2.5, 0, 1.0, 0]
          - [0.0, 0.3, 1.8, 100]
          - [0.0, -0.3, 1.8, -100]
          - [-2.0, 0.0, 1.5, 180]
      lidar:
        visualize: false
        channels: 128
        range: 120
        points_per_second: 5000000
        rotation_frequency: 20
        upper_fov: 20
        lower_fov: -90
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false
      dt: ${world.fixed_delta_seconds}
      gnss:
        noise_alt_stddev: 0.05
        noise_lat_stddev: 3e-6
        noise_lon_stddev: 3e-6

carla_traffic_manager:
  vehicle_list: []
  range: []

scenario:
  rsu_list:
    - name: rsu_town01_143
      spawn_position: [336.93, 5.39, 2.0, 0, 0, 0]
      id: 1
      behavior_services:
        - type: aim_server
          debug: true
          control_radius: 45
          control_center_location:
            x: 336.93
            y: 5.39
            z: 2.0
          model: "MTP"
          underling_model: "GNN_mtl_gnn"
          hidden_channels: 128
          weight: "model_rot_gnn_mtl_np_sumo_0911_e3_1930.pth"
          priority: 1
    - name: rsu_town01_194
      spawn_position: [331.23, 197.40, 2.0, 0, 0, 0]
      id: 2
      behavior_services:
        - type: aim_server
          debug: true
          control_radius: 45
          control_center_location:
            x: 331.23
            y: 197.40
            z: 2.0
          model: "MTP"
          underling_model: "GNN_mtl_gnn"
          hidden_channels: 128
          weight: "model_rot_gnn_mtl_np_sumo_0911_e3_1930.pth"
          priority: 1

  single_cav_list:
    - name: cav_town01_143_southbound
      spawn_position: [334.83, 42.00, 0.30, 0, -90.0, 0]
      destination: [334.77, 12.31, 0.30]
      id: 101
      color: [30, 144, 255]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller
    - name: cav_town01_143_westbound
      spawn_position: [370.00, 4.15, 0.30, 0, 180.0, 0]
      destination: [324.47, 4.15, 0.30]
      id: 102
      color: [34, 139, 34]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller
    - name: cav_town01_194_southbound
      spawn_position: [334.89, 240.00, 0.30, 0, -90.0, 0]
      destination: [334.89, 184.79, 0.30]
      id: 103
      color: [255, 140, 0]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller
    - name: cav_town01_194_eastbound
      spawn_position: [285.50, 190.80, 0.30, 0, 0.0, 0]
      destination: [343.15, 190.80, 0.30]
      id: 104
      color: [138, 43, 226]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller
