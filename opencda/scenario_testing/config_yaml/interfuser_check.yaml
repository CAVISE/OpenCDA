description: |-
  Single-CAV InterFuser autopilot evaluation scenario.
  The route crosses a Town06 junction and turns into a perpendicular road,
  with moderate CARLA Traffic Manager background traffic near the junction.

world:
  town: Town06
  seed: 11
  weather:
    sun_altitude_angle: 35
    cloudiness: 15
    precipitation: 0
    precipitation_deposits: 0
    wind_intensity: 0
    fog_density: 0
    fog_distance: 0
    fog_falloff: 0
    wetness: 0

vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        force_spawn: true
        num: 3
        positions:
          - [1.3, 0.0, 2.3, 0.0]
          - [1.3, 0.0, 2.3, -60.0]
          - [1.3, 0.0, 2.3, 60.0]
      lidar:
        visualize: false
        force_spawn: true
        position: [1.3, 0.0, 2.5, -90.0]
        channels: 32
        range: 50
        points_per_second: 100000
        rotation_frequency: 20
        upper_fov: 10.0
        lower_fov: -30.0
        dropoff_general_rate: 0.0
        dropoff_intensity_limit: 1.0
        dropoff_zero_intensity: 0.0
        noise_stddev: 0.0
  map_manager:
    visualize: true
  behavior:
    max_speed: 25
    ignore_traffic_light: false
    collision_time_ahead: 2.0
    local_planner:
      debug: true
      debug_trajectory: true
  behavior_services:
    - type: self_informer
    - type: autopilot_interfuser
      model: interfuser_baseline
      model_path: leaderboard/team_code/interfuser.pth.tar
      device: auto
      debug: true
      fail_on_model_error: false
      front_camera_index: 0
      left_camera_index: 1
      right_camera_index: 2
      route_waypoint_index: 1
      predicted_waypoint_index: 1
      max_target_speed_kmh: 14.0
    - type: movement_controller

carla_traffic_manager:
  sync_mode: true
  global_distance: 8
  global_speed_perc: 20
  set_osm_mode: true
  auto_lane_change: false
  ignore_lights_percentage: 0
  ignore_signs_percentage: 0
  ignore_vehicles_percentage: 0
  ignore_walkers_percentage: 0
  random_left_lanechange_percentage: 0
  random_right_lanechange_percentage: 0
  random: false
  vehicle_list: ~
  range:
    - [-25, 45, -85, 120, 12, 24, 14]

scenario:
  single_cav_list:
    - name: cav1
      spawn_position: [39.4, -19.0, 0.3, 0, 180, 0]
      destination: [-5.4, 112.3, 0.3]
      id: 1
      color: [40, 180, 255]
      behavior:
        local_planner:
          debug_trajectory: true
          debug: true
