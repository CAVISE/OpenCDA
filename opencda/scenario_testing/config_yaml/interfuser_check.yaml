description: |-
  Single-CAV smoke scenario for the autopilot_interfuser behavior service.

world:
  town: Town06

vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        force_spawn: true
        num: 3
        positions:
          - [1.3, 0.0, 2.3, 0.0]
          - [1.3, 0.0, 2.3, -60.0]
          - [1.3, 0.0, 2.3, 60.0]
      lidar:
        visualize: false
        force_spawn: true
        position: [1.3, 0.0, 2.5, -90.0]
        channels: 32
        range: 50
        points_per_second: 100000
        rotation_frequency: 20
        upper_fov: 10.0
        lower_fov: -30.0
        dropoff_general_rate: 0.0
        dropoff_intensity_limit: 1.0
        dropoff_zero_intensity: 0.0
        noise_stddev: 0.0
  behavior_services:
    - type: self_informer
    - type: autopilot_interfuser
      model: interfuser_baseline
      model_path: leaderboard/team_code/interfuser.pth.tar
      device: auto
      debug: true
      fail_on_model_error: false
      front_camera_index: 0
      left_camera_index: 1
      right_camera_index: 2
      route_waypoint_index: 1
      predicted_waypoint_index: 1
      max_target_speed_kmh: 18.0
    - type: movement_controller

carla_traffic_manager:
  random: false
  vehicle_list: []

scenario:
  single_cav_list:
    - name: cav1
      spawn_position: [47.7194, 139.51, 0.3, 0, 0, 0]
      destination: [600, 145.51, 0.3]
      id: 1
      behavior:
        local_planner:
          debug_trajectory: false
          debug: false
