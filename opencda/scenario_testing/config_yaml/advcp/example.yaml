# Example AdvCP spoofing config with all supported parameters.

# Attack mode.
# Currently only `spoof` is implemented.
mode: spoof

# Agent id that performs the spoofing attack.
attacker_id: cav-2

# Early spoofing density mode:
# 0 = replace   : replace existing hit points with spoofed intersections
# 1 = dense_a   : append dense spoofed points from one virtual offset
# 2 = dense_all : append dense spoofed points using offsets from all collaborators
# 3 = sampled   : sample spoofed points from mesh pieces
density: 3

# Virtual sensor offset in meters used by dense_a and dense_all.
dense_distance: 10.0

# Default spoofed object size [length, width, height].
# Used when a box entry does not define its own `size`.
default_size: [4.5, 2.0, 1.6]

# 3D car mesh used for ray-traced spoofing.
# Relative paths are resolved from this YAML file.
car_mesh_path: ../../../core/attack/advcp/3d_models/car_mesh_0200.ply

# Mesh partition file used to split the car mesh into pieces for sampled spoofing.
# Relative paths are resolved from this YAML file.
car_mesh_divide_path: ../../../core/attack/advcp/3d_models/spoof/car_mesh_divide.pkl

# Spoofed object specifications.
# Each entry must define exactly one of:
# - `relative`: pose relative to ego vehicle
# - `absolute`: pose in world coordinates
#
# Pose format:
# [x, y, z, roll, yaw, pitch]
#
# Optional per-box `size` format:
# [length, width, height]
boxes:
  # Forward spoof using default_size.
  - relative: [15.0, 0.0, 0.0, 0.0, 90.0, 0.0]

  # Custom-sized spoof relative to ego.
  - relative: [25.0, -3.5, 0.0, 0.0, 90.0, 0.0]
    size: [4.8, 2.1, 1.7]

  # Example absolute pose in world coordinates.
  # Uncomment and adjust if you want a world-fixed spoof target.
  # - absolute: [120.0, 45.0, 0.0, 0.0, 90.0, 0.0]
  #   size: [4.5, 2.0, 1.6]
