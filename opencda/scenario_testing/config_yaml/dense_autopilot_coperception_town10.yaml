description: |-
  Large-scale Town10HD scenario for CARLA-autopilot CAV integration and cooperative perception testing.
  Target setup: 18 RSUs, up to 20 autopilot-controlled CAVs, and 100 background traffic vehicles.
  Use this scenario to validate perception data collection, V2X/cooperative perception behavior, and runtime scalability under dense urban traffic.

world:
  town: Town10HD
  sync_mode: true
  client_port: 2000
  fixed_delta_seconds: 1
  seed: 11 # seed for numpy and random
  weather:
    sun_altitude_angle: 60 # 90 is the midday and -90 is the midnight
    cloudiness: 0 # 0 is the clean sky and 100 is the thickest cloud
    precipitation: 10 # rain, 100 is the heaviest rain
    precipitation_deposits: 0 # Determines the creation of puddles. Values range from 0 to 100, being 0 none at all and 100 a road completely capped with water.
    wind_intensity: 0 # it will influence the rain
    fog_density: 0 # fog thickness, 100 is the largest
    fog_distance: 0  # Fog start distance. Values range from 0 to infinite.
    fog_falloff: 0 # Density of the fog (as in specific mass) from 0 to infinity. The bigger the value, the more dense and heavy it will be, and the fog will reach smaller heights
    wetness: 0

blueprint:
  use_multi_class_bp: true
  bp_meta_path: "opencda/assets/blueprint_meta/bbx_stats_0915.json" # Define the path for loading the blueprint metadata for defining the class of each blueprint
  # Define blueprint type sample probabilities
  bp_class_sample_prob:
    car: 1 # 0.6
    truck: 0 # 0.14
    bus: 0 # 0.15
    bicycle: 0 # 0.03
    motorcycle: 0 # 0.08

rsu_base:
  sensing:
    perception:
      activate: false # when not activated, objects positions will be retrieved from server directly
      camera:
        visualize: 0
        num: 0
      lidar: # lidar sensor configuration, check CARLA sensor reference for more details
        visualize: false
        channels: 64
        range: 120
        points_per_second: 2000000
        rotation_frequency: 20 # the simulation is 20 fps
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: true # when not activated, ego position will be retrieved from server directly
      dt: ${world.fixed_delta_seconds} # used for kalman filter
      gnss: # gnss sensor configuration
        noise_alt_stddev: 0.05
        noise_lat_stddev: 3e-6
        noise_lon_stddev: 3e-6

vehicle_base:
  sensing:
    perception:
      activate: false # when not activated, objects positions will be retrieved from server directly
      camera:
        visualize: 0
        num: 0
      lidar: # lidar sensor configuration, check CARLA sensor reference for more details
        visualize: false
        channels: 64
        range: 120
        points_per_second: 2000000
        rotation_frequency: 20 # the simulation is 20 fps
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: true # when not activated, ego position will be retrieved from server directly
      dt: ${world.fixed_delta_seconds} # used for kalman filter
      gnss: # gnss sensor configuration
        noise_alt_stddev: 0.05
        noise_lat_stddev: 3e-6
        noise_lon_stddev: 3e-6
  behavior:
    ignore_traffic_light: false # whether to ignore traffic light
    collision_time_ahead: 2.0 # used for collision checking
    local_planner:
      debug: true # whether to draw future/history waypoints
      debug_trajectory: true # whether to draw the trajectory points and path
  carla_autopilot: true
  carla_autopilot_port: 8000

  safety_manager: # used to watch the safety status of the cav
    print_message: false # whether to print the message if hazard happens

carla_traffic_manager:
  global_speed_perc: -20
  auto_lane_change: true
  random: true # whether to random select vehicles' color and model
  ignore_lights_percentage: 100 # whether set the traffic ignore traffic lights
  ignore_signs_percentage: 0
  ignore_vehicles_percentage: 0
  ignore_walkers_percentage: 0
  random_left_lanechange_percentage: 0
  random_right_lanechange_percentage: 0
  vehicle_list: ~  # a number or a list
  # Used only when vehicle_list is a number.
  #  x_min, x_max, y_min, y_max, x_step, y_step, vehicle_num
  range:
    - [-130, 130, -80, 180, 4, 4, 100]



