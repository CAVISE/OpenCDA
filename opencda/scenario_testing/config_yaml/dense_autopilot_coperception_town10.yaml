description: |-
  Large-scale Town10HD scenario for CARLA-autopilot CAV integration and CoP testing.
  Target setup: 18 RSUs, up to 19 autopilot-controlled CAVs, and 100 background traffic vehicles.
  Use this scenario to validate perception data collection, V2X/CoP behavior, and runtime scalability under dense urban traffic.


world:
  town: Town10HD
  sync_mode: true
  client_port: 2000
  fixed_delta_seconds: 0.1
  substepping: true
  max_substep_delta_time: 0.01
  max_substeps: 10
  seed: 67
  weather:
    sun_altitude_angle: 30


blueprint:
  use_multi_class_bp: true
  bp_meta_path: "opencda/assets/blueprint_meta/bbx_stats_0915.json"
  bp_class_sample_prob:
    car: 1        # 0.6
    truck: 0      # 0.14
    bus: 0        # 0.15
    bicycle: 0    # 0.03
    motorcycle: 0 # 0.08


rsu_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 0
      lidar:
        visualize: false
        channels: 64
        range: 120
        points_per_second: 1000000
        rotation_frequency: 10
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false


vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 0
      lidar:
        visualize: false
        channels: 64
        range: 120
        points_per_second: 1000000
        rotation_frequency: 10
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false
  behavior:
    local_planner:
      debug: false
      debug_trajectory: false
  carla_autopilot: true
  carla_autopilot_port: 8000
  safety_manager:
    print_message: false
  map_manager:
    activate: false
    visualize: false


carla_traffic_manager:
  cav_spawn_clearance: 10
  set_osm_mode: false
  global_distance: 3
  global_speed_perc: -20
  auto_lane_change: true
  random: true
  ignore_lights_percentage: 0
  ignore_signs_percentage: 0
  ignore_vehicles_percentage: 0
  ignore_walkers_percentage: 0
  random_left_lanechange_percentage: 0
  random_right_lanechange_percentage: 0
  vehicle_list: ~
  range:
    - [-130, 130, -80, 180, 4, 4, 100]


