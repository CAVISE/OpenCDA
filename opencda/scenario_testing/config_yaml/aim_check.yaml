description: |-
  This is the scenario testing aim models with 4 cars and 1 rsu in town04

world:
  town: Town04

blueprint:
  use_multi_class_bp: true
  bp_meta_path: "opencda/assets/blueprint_meta/bbx_stats_0915.json" # Define the path for loading the blueprint metadata for defining the class of each blueprint
  # Define blueprint type sample probabilities
  bp_class_sample_prob:
    car: 0.5
    truck: 0.1
    bus: 0.1
    bicycle: 0.1
    motorcycle: 0.1

rsu_base:
  sensing:
    perception:
      activate: false # when not activated, objects positions will be retrieved from server directly
      camera:
        visualize: 0 # how many camera images need to be visualized. 0 means no visualization for camera
        num: 4 # how many cameras are mounted on the vehicle. Maximum 3(frontal, left and right cameras)
        # relative positions (x,y,z,yaw) of the camera. len(positions) should be equal to camera num
        positions:
          - [2.5, 0, 1.0, 0]
          - [0.0, 0.3, 1.8, 100]
          - [0.0, -0.3, 1.8, -100]
          - [-2.0, 0.0, 1.5, 180]
      lidar: # lidar sensor configuration, check CARLA sensor reference for more details
        visualize: false
        channels: 32
        range: 120
        points_per_second: 1000000
        rotation_frequency: 20 # the simulation is 20 fps
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02
    localization:
      activate: false # when not activated, ego position will be retrieved from server directly
      dt: ${world.fixed_delta_seconds} # used for kalman filter
      gnss: # gnss sensor configuration
        noise_alt_stddev: 0.05
        noise_lat_stddev: 3e-6
        noise_lon_stddev: 3e-6


# First define the basic parameters of the vehicles
vehicle_base:
  sensing:
    perception:
      activate: false # when not activated, objects positions will be retrieved from server directly
      camera:
        visualize: 0 # how many camera images need to be visualized. 0 means no visualization for camera
        num: 4 # how many cameras are mounted on the vehicle. Maximum 3(frontal, left and right cameras)
        # relative positions (x,y,z,yaw) of the camera. len(positions) should be equal to camera num
        positions:
          - [2.5, 0, 1.0, 0]
          - [0.0, 0.3, 1.8, 100]
          - [0.0, -0.3, 1.8, -100]
          - [-2.0, 0.0, 1.5, 180]
      lidar: # lidar sensor configuration, check CARLA sensor reference for more details
        visualize: false
        channels: 32
        range: 120
        points_per_second: 1000000
        rotation_frequency: 20 # the simulation is 20 fps
        upper_fov: 2
        lower_fov: -25
        dropoff_general_rate: 0.3
        dropoff_intensity_limit: 0.7
        dropoff_zero_intensity: 0.4
        noise_stddev: 0.02

    localization:
      activate: false # when not activated, ego position will be retrieved from server directly
      debug_helper:
        show_animation: false # whether to show real-time trajectory plotting

  behavior:
    ignore_traffic_light: ture # whether to ignore traffic light
    collision_time_ahead: 2.0 # used for collision checking
    local_planner:
      debug: true # whether to draw future/history waypoints
      debug_trajectory: true # whether to draw the trajectory points and path
  color: [122, 156, 111]

scenario:
  rsu_list:
    - name: rsu1
      spawn_position: [256, -171, 15, 0, 0, 0]
      id: 1
      behavior_services:
        - type: aim_server
          debug: true
          control_radius: 15
          control_center_location:
            x: 256
            y: -171
            z: 15
          model: "MTP"
          underling_model: TransfAny_v2_local_coords
          model_params:
            cars_hidden_channels: 128
            lane_hidden_channels: 128
            lane_conv_iters: 4
            bias: true
            dropout: 0.1
            cross_attn_n_heads: 4
            cross_attn_n_attn: 3
            cross_attn_n_linear: 3
            cars_self_attn_n_heads: 4
            cars_self_attn_n_attn: 4
            cars_self_attn_n_linear: 3
            decoder_n_linear_decoder: 4
          weight: "model_wp_train_config0_model_config0_0399.pth"
          y_x_distr_file: "y_x_distr_file.pkl"
          y_y_distr_file: "y_y_distr_file.pkl"
          map_net_xml_path: "AIM/models/mtp/learning/data/sumo_maps/simple_separate_10m.net.xml"
          priority: 1
  single_cav_list:
    - name: cav1
      spawn_position: [209, -170, 0.3, 0, 0, 0]
      destination: [304 , -170, 0.3]
      id: 100
      color: [156, 255, 206]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller

    - name: cav2
      spawn_position: [285, -172, 0.3, 0, 180, 0]
      destination: [209, -172, 0.3]
      id: 200
      color: [156, 255, 206]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller

    - name: cav3
      spawn_position: [255, -200, 0.3, 0, 90, 0]
      destination: [255, -130, 0.3]
      id: 300
      color: [156, 255, 206]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller

    - name: cav4
      spawn_position: [258, -130, 0.3, 0, -90, 0]
      destination: [258, -225, 0.3]
      id: 400
      color: [156, 255, 206]
      behavior_services:
        - type: self_informer
        - type: aim_client
          debug: true
        - type: movement_controller
