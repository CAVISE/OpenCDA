# For advcp_check scenario
mode: spoof

attacker_ids: [cav-5] # 1 attacker (helper-leftside-cav-5)
#attacker_ids: [cav-3] # 1 attacker (helper-backward-cav-3)
#attacker_ids: [cav-2, cav-3, cav-5, cav-6, cav-7] # 5 attackers, 1 benign
#attacker_ids: [cav-2, cav-3, cav-4, cav-5, cav-6, cav-7] # all 6 are attackers

default_size: [4.5, 2.0, 1.6]
boxes:
  - absolute: [35, 149.792206, 0.0, 0.0, 0.0, 0.0] # remove custom-cav-20

density: sampled # replace, dense_a, denseall/dense_all, sampled
dense_distance: 10.0 # used by dense_a and dense_all early spoofing
max_perturb: 10.0 # used by intermediate spoofing
lr: 0.05 # used by intermediate spoofing
step: 25 # number of optimization steps for intermediate spoofing
sync: true # false = optimize on current tick, true = optimize on previous tick and apply/evaluate on current tick
init: true # start intermediate optimization from mesh-based LiDAR spoofing, not from a zero perturbation
online: true # carry half of the previous tick perturbation into the next tick
feature_size: 10 # patch half-size in feature space, so 10 means a 20 x 20 patch
car_mesh_path: ../../../core/attack/advcp/3d_models/car_mesh_0200.ply # used by early spoofing and by intermediate spoofing when init=true
car_mesh_divide_path: ../../../core/attack/advcp/3d_models/spoof/car_mesh_divide.pkl # mesh partition for sampled/init ray tracing
