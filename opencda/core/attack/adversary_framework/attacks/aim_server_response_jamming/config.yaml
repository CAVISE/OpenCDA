attack:
  name: aim_server_response_jamming

  requirements:
    all:
      - source:
          kind: snapshot
          node_type: rsu
          service_type: aim_server
        verb: exists
      - source:
          kind: snapshot
          node_type: vehicle
          service_type: aim_client
        verb: exists

  start_trigger:
    source:
      kind: snapshot
      node_type: rsu
      service_type: aim_server
      field: tracked_vehicle_count
    verb: increased
    value: 1

  stop_trigger:
    source:
      kind: snapshot
      node_type: rsu
      service_type: aim_server
      field: tracked_vehicle_count
    verb: eq
    value: 0

  targets:
    kind: service_state_field
    source:
      kind: snapshot
      node_type: rsu
      service_type: aim_server
      field: owner_id
    resolve_to:
      node_type: rsu
      service_type: aim_server

  stages:
    - id: drop_aim_server_responses
      type: dropper
      capabilities:
        - response.submit
      stage_stop_trigger:
        source:
          kind: snapshot
          node_type: rsu
          service_type: aim_server
          field: tracked_vehicle_count
        verb: eq
        value: 0
