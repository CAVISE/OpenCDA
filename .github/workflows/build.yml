name: Build native artifacts

on:
  workflow_dispatch:
  pull_request:

jobs:
  cuda:
    uses: CAVISE/pipelines/.github/workflows/python-cmake-cuda.yml@feature/opencda-cmake-build
    with:
      requirements-file: requirements-cuda.txt
      cuda-architectures: "86"
      pythonpath-subdir: OpenCOOD
      python-import-modules: >-
        ["opencood.pcdet_utils.iou3d_nms.iou3d_nms_cuda",
        "opencood.pcdet_utils.pointnet2.pointnet2_batch.pointnet2_batch_cuda",
        "opencood.pcdet_utils.pointnet2.pointnet2_stack.pointnet2_stack_cuda",
        "opencood.pcdet_utils.roiaware_pool3d.roiaware_pool3d_cuda"]
