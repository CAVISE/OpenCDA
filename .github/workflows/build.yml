name: Build Extensions

on: [pull_request]

jobs:
  build-protobuf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config
      - run: pip install cmake ninja protobuf numpy pybind11 mypy-protobuf
      - name: Configure and build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DOPENCDA_BUILD_CUDA=OFF \
            -DOPENCDA_BUILD_CYTHON=OFF \
            -DOPENCDA_BUILD_PROTOBUF=ON
          cmake --build build
      - run: ls opencda/core/common/communication/protos/cavise/*_pb2.py | wc -l | grep -q 4

  build-cython:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cmake ninja cython cython-cmake numpy pybind11
      - name: Configure and build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DOPENCDA_BUILD_CUDA=OFF \
            -DOPENCDA_BUILD_CYTHON=ON \
            -DOPENCDA_BUILD_PROTOBUF=OFF
          cmake --build build
      - run: find build -name "box_overlaps*" -type f

