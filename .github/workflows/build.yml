name: Build Extensions

on:
  push:
    branches: [main, develop]
    paths:
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - 'pyproject.toml'
      - 'OpenCOOD/opencood/pcdet_utils/**'
      - 'OpenCOOD/opencood/utils/**'
      - 'opencda/core/common/communication/messages/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-protobuf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev
      - run: pip install cmake ninja protobuf
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DOPENCDA_BUILD_CUDA=OFF -DOPENCDA_BUILD_CYTHON=OFF -DOPENCDA_BUILD_PROTOBUF=ON
      - run: cmake --build build
      - run: test -f opencda/core/common/communication/protos/cavise/capi_pb2.py

  build-cython:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cmake ninja cython numpy pybind11
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DOPENCDA_BUILD_CUDA=OFF -DOPENCDA_BUILD_CYTHON=ON -DOPENCDA_BUILD_PROTOBUF=OFF -Dpybind11_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())")
      - run: cmake --build build
      - run: find build -name "box_overlaps*" -type f

  build-cuda:
    runs-on: [self-hosted, cuda]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cmake ninja cython numpy pybind11
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES="86;89" -DOPENCDA_BUILD_CUDA=ON -DOPENCDA_BUILD_CYTHON=OFF -DOPENCDA_BUILD_PROTOBUF=OFF -Dpybind11_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())")
      - run: cmake --build build
      - run: find build -name "*_cuda*.so" -type f
