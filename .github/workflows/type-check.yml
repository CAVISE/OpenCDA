name: type-check

on:
  pull_request:

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config

      - name: Install dependencies
        run: pip install mypy mypy-protobuf cmake ninja protobuf numpy pybind11

      - name: Generate protobuf modules
        run: |
          cmake -B build -G Ninja -DOPENCDA_BUILD_CUDA=OFF -DOPENCDA_BUILD_CYTHON=OFF -DOPENCDA_BUILD_PROTOBUF=ON
          cmake --build build
          cmake --install build --prefix .

      - name: Run mypy
        run: mypy . --follow-imports=silent
