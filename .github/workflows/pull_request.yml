name: Lint, Format, Type and Unused code Check

on: [ pull_request ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run ruff format check with diff
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config
      - name: Install Dependencies
        run: pip install mypy mypy-protobuf cmake ninja protobuf numpy pybind11
      - name: Generate protobufs modules
        run: |
          cmake -B build -G Ninja -DOPENCDA_BUILD_CUDA=OFF -DOPENCDA_BUILD_CYTHON=OFF -DOPENCDA_BUILD_PROTOBUF=ON
          cmake --build build
          cmake --install build --prefix .
      - name: Run mypy
        run: mypy . --follow-imports=silent

  unused-code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: pip install deadcode
      - name: Run deadcode
        run: |
          python - <<'PY'
          import sys
          from deadcode.cli import main

          result = main(['.'])
          if result is not None:
              print(result)
              sys.exit(1)
          PY

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: ruff-check,ruff-format,pretty-format-json
        with:
          extra_args: >-
            --all-files
