name: pytest

on:
  workflow_dispatch:
  pull_request:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            .github/workflows/requirements/requirements-ci.txt
            pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements/requirements-ci.txt

      - name: Build extensions
        shell: bash
        run: |
          pip install cmake ninja cython protobuf pybind11 mypy-protobuf
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DOPENCDA_BUILD_CUDA=OFF \
            -DOPENCDA_BUILD_CYTHON=ON \
            -DOPENCDA_BUILD_PROTOBUF=ON
          cmake --build build
          cmake --install build --prefix .
          cmake --install build --prefix OpenCOOD

      - name: Run tests
        run: |
          mkdir -p reports
          pytest -ra --maxfail=0 --continue-on-collection-errors \
            --junitxml=reports/pytest-${{ matrix.python-version }}.xml

      - name: Upload JUnit report
        if: always() && !env.ACT
        uses: actions/upload-artifact@v7
        with:
          name: pytest-junit-${{ matrix.python-version }}
          path: reports/pytest-${{ matrix.python-version }}.xml
          
