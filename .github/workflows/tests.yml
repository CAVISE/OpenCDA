name: Tests (matrix, CI deps)

on:
  workflow_dispatch:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            .github/workflows/requirements/requirements-ci.txt
            .github/workflows/requirements/constraints-py310.txt
            .github/workflows/requirements/constraints-py312.txt
            pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [[ "${{ matrix.python-version }}" == "3.10" ]]; then
            pip install -r .github/workflows/requirements/requirements-ci.txt -c .github/workflows/requirements/constraints-py310.txt
          else
            pip install -r .github/workflows/requirements/requirements-ci.txt -c .github/workflows/requirements/constraints-py312.txt
          fi

      - name: Build extensions
        shell: bash
        run: |
          pip install cmake ninja cython protobuf
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DOPENCDA_BUILD_CUDA=OFF -DOPENCDA_BUILD_CYTHON=ON -DOPENCDA_BUILD_PROTOBUF=ON
          cmake --build build
          cmake --install build --prefix .

      - name: Run tests
        run: |
          mkdir -p reports
          pytest -ra --maxfail=0 --continue-on-collection-errors \
            --junitxml=reports/pytest-${{ matrix.python-version }}.xml

      - name: Upload JUnit report
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-${{ matrix.python-version }}
          path: reports/pytest-${{ matrix.python-version }}.xml
